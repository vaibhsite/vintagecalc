<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="calculator">

    <div class="calculation">
      <div class="display">
        <input type="text" id="input" placeholder="0" disabled>
      </div>

      <div class="buttons">

        <div class="numbers">
          <button class="digit-button button" data-value="7">7</button>
          <button class="digit-button button" data-value="8">8</button>
          <button class="digit-button button" data-value="9">9</button>

          <button class="digit-button button" data-value="4">4</button>
          <button class="digit-button button" data-value="5">5</button>
          <button class="digit-button button" data-value="6">6</button>

          <button class="digit-button button" data-value="1">1</button>
          <button class="digit-button button" data-value="2">2</button>
          <button class="digit-button button" data-value="3">3</button>

          <button class="digit-button button zero" data-value="0">0</button>
          <button class="digit-button button" data-value=".">.</button>
        </div>

        <div class="operations">
          <button class="operation-button button" data-value="AC">AC</button>
          <button class="operation-button button" data-value="DEL">DEL</button>

          <button class="operation-button button" data-value="/">÷</button>
          <button class="operation-button button" data-value="*">×</button>

          <button class="operation-button button" data-value="-">−</button>
          <button class="operation-button button" data-value="+">+</button>

          <button class="operation-button button equal" data-value="=">=</button>
        </div>

      </div>
    </div>

    <div class="history">
      <h2 id="historyTitle">History</h2>
      <div id="historyContent"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
